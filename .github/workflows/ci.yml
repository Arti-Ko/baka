name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    # macOS 26 runner to match the local Xcode 26 / macOS 26 SDK toolchain.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)" || true

      - name: Show toolchain
        run: swift --version && xcodebuild -version

      - name: Build
        run: swift build -c debug

      - name: Test
        run: swift test

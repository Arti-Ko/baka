name: Release

# Builds a signed-ad-hoc .app bundle and publishes it as a GitHub Release
# whenever a version tag (vX.Y.Z) is pushed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    # macOS 26 runner → builds against the macOS 26 SDK so the release adopts
    # the same native design as a local Xcode 26 build (macos-15 linked the
    # older SDK and rendered in the legacy style on Tahoe).
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)" || true

      - name: Show toolchain
        run: swift --version && xcodebuild -version

      - name: Run tests
        run: swift test

      - name: Build & bundle Baka.app
        run: ./Scripts/bundle.sh release

      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent baka.app Baka-macos.zip
          ls -lh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Baka ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/Baka-macos.zip
